version: '3.8'

services:
  # ===== OpenLIT Dashboard from AWS ECR =====
  openlit:
    image: 586794484970.dkr.ecr.us-east-1.amazonaws.com/openlit-vostok:latest
    platform: linux/arm64
    container_name: openlit-dashboard
    environment:
      - TELEMETRY_ENABLED=true
      - SQLITE_DATABASE_URL=file:/app/client/data/data.db
      - PORT=3000
      - DOCKER_PORT=3000
      - DEMO_ACCOUNT_EMAIL=demo@vostok.local
      - DEMO_ACCOUNT_PASSWORD=demo123
    ports:
      - "3000:3000"
    volumes:
      - openlit-data:/app/client/data
    networks:
      - vostok-network
    restart: always

  # ===== OpenTelemetry Collector (using official image) =====
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.94.0
    platform: linux/arm64
    container_name: vostok-otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Metrics endpoint
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    networks:
      - vostok-network
    restart: always
    depends_on:
      - openlit

  # ===== Vostok RAG API from AWS ECR =====
  vostok-api:
    image: 586794484970.dkr.ecr.us-east-1.amazonaws.com/vostok-rag-api:latest
    platform: linux/arm64
    container_name: vostok-rag-api
    environment:
      # API Keys from .env file
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME:-vostok-demo}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}

      # OpenTelemetry Configuration
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_INSECURE=true
      - OPENLIT_APPLICATION_NAME=vostok-rag-api
      - OPENLIT_ENVIRONMENT=production

      # Application Configuration
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost,http://34.225.86.252,http://vostok-ui
    ports:
      - "8000:8000"
    networks:
      - vostok-network
    restart: always
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===== Simple Nginx for UI =====
  vostok-ui:
    image: nginx:alpine
    container_name: vostok-chat-ui
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.simple.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - vostok-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  openlit-data:
    driver: local

networks:
  vostok-network:
    driver: bridge
    name: vostok-network
