version: '3.8'

services:
  vostok-ui:
    image: ghcr.io/stgerman/vostok-chat-ui:latest
    container_name: vostok-ui
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.vostok.service=chat-ui"
      - "com.vostok.version=1.0.0"
    networks:
      - vostok-network

  # Optional: Vostok API service (if you want to deploy together)
  # vostok-api:
  #   image: ghcr.io/stgerman/vostok-api:latest
  #   container_name: vostok-api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
  #     - OPENLIT_APPLICATION_NAME=vostok-production
  #     - PINECONE_API_KEY=${PINECONE_API_KEY}
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
  #   restart: unless-stopped
  #   networks:
  #     - vostok-network

networks:
  vostok-network:
    driver: bridge
